<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Neurocompute | Articles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-end mb-3">
      <div>
        <h2 class="mb-0">Neurocompute</h2>
        <div class="text-muted">Latest ingested articles</div>
      </div>
      <div class="text-muted">Total: {{ total }}</div>
    </div>

    <div class="table-responsive bg-white border rounded">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th style="width:120px;">Date</th>
            <th>Title</th>
            <th style="width:220px;">Journal</th>
            <th style="width:120px;">PMID</th>
          </tr>
        </thead>
        <tbody>
          {% for it in items %}
          <tr>
            <td>{{ it.publication_date or "" }}</td>
            <td>{{ it.title }}</td>
            <td class="text-muted">{{ it.journal or "" }}</td>
            <td class="text-muted">{{ it.pmid or "" }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>

    <nav class="mt-3">
      <ul class="pagination">
        <li class="page-item {% if page <= 1 %}disabled{% endif %}">
          <a class="page-link" href="/articles?page={{ page-1 }}&per_page={{ per_page }}">Prev</a>
        </li>
        <li class="page-item disabled"><span class="page-link">Page {{ page }} / {{ total_pages }}</span></li>
        <li class="page-item {% if page >= total_pages %}disabled{% endif %}">
          <a class="page-link" href="/articles?page={{ page+1 }}&per_page={{ per_page }}">Next</a>
        </li>
      </ul>
    </nav>
  </div>
</body>
</html>
